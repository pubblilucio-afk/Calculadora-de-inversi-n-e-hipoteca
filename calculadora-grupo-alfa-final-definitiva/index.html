<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Grupo Alfa</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Calculadora inmobiliaria de Grupo Alfa: rentabilidad, hipoteca, cashflow y ROI financiación." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .print-card { box-shadow: none !important; border: 1px solid #e5e7eb !important; break-inside: avoid; }
      .print-page { padding: 0 !important; }
    }
  </style>
</head>

<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const euro = new Intl.NumberFormat("es-ES", {
      style: "currency",
      currency: "EUR",
      maximumFractionDigits: 0
    });

    const euro2 = new Intl.NumberFormat("es-ES", {
      style: "currency",
      currency: "EUR",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const pct = (n) => `${Number.isFinite(n) ? n.toFixed(2).replace(".", ",") : "0,00"}%`;

    function safeDiv(a, b) {
      return b > 0 ? a / b : 0;
    }

    function mortgagePayment(principal, annualRate, years) {
      const months = years * 12;
      const monthlyRate = annualRate / 100 / 12;
      if (principal <= 0 || months <= 0) return 0;
      if (monthlyRate === 0) return principal / months;
      return principal * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
    }

    function rating(value) {
      if (value < 5) return { text: "No recomendable", tone: "bad" };
      if (value <= 6.5) return { text: "Aceptable con reservas", tone: "warn" };
      return { text: "Altamente recomendable", tone: "good" };
    }

    function Field({ label, value, setValue, suffix = "€", step = "100" }) {
      return (
        <div className="space-y-1">
          <label className="text-sm text-slate-600">{label}</label>
          <div className="relative">
            <input
              type="number"
              value={Number.isFinite(value) ? value : 0}
              step={step}
              onChange={(e) => setValue(Number(e.target.value || 0))}
              className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 pr-14 text-slate-900 outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200"
            />
            <span className="absolute right-3 top-2.5 text-sm text-slate-400">{suffix}</span>
          </div>
        </div>
      );
    }

    function Metric({ title, value, subtitle, tone = "default" }) {
      const tones = {
        default: "bg-white border-slate-200",
        good: "bg-emerald-50 border-emerald-200",
        warn: "bg-amber-50 border-amber-200",
        bad: "bg-red-50 border-red-200"
      };

      return (
        <div className={`print-card rounded-2xl border p-4 shadow-sm ${tones[tone] || tones.default}`}>
          <p className="text-sm text-slate-500">{title}</p>
          <p className="mt-1 text-2xl font-semibold text-slate-950">{value}</p>
          {subtitle && <p className="mt-1 text-xs text-slate-500">{subtitle}</p>}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("inversion");

      const [price, setPrice] = useState(100000);
      const [itpRate, setItpRate] = useState(7.75);
      const [notary, setNotary] = useState(950);
      const [registry, setRegistry] = useState(0);
      const [reform, setReform] = useState(2000);
      const [psi, setPsi] = useState(5000);
      const [agency, setAgency] = useState(1000);
      const [ivaRate, setIvaRate] = useState(21);
      const [includeIvaFees, setIncludeIvaFees] = useState(false);

      const [ibi, setIbi] = useState(350);
      const [community, setCommunity] = useState(180);
      const [homeInsurance, setHomeInsurance] = useState(180);
      const [rentInsurance, setRentInsurance] = useState(250);
      const [others, setOthers] = useState(0);
      const [management, setManagement] = useState(0);

      const [pessimistic, setPessimistic] = useState(700);
      const [realistic, setRealistic] = useState(750);
      const [optimistic, setOptimistic] = useState(800);

      // Final definitivo: base al 80%
      const [ltv, setLtv] = useState(80);
      const [interest, setInterest] = useState(2.5);
      const [years, setYears] = useState(30);

      const data = useMemo(() => {
        const safePrice = Math.max(0, price);
        const itp = safePrice * itpRate / 100;
        const ivaFees = includeIvaFees ? (psi + agency) * ivaRate / 100 : 0;

        const purchaseCosts = itp + notary + registry + psi + agency + ivaFees;
        const totalInvestment = safePrice + reform + purchaseCosts;
        const annualExpenses = ibi + community + homeInsurance + rentInsurance + others + management;

        const scenarios = [
          { name: "Pesimista", monthly: pessimistic },
          { name: "Realista", monthly: realistic },
          { name: "Optimista", monthly: optimistic }
        ].map((s) => {
          const annualRent = s.monthly * 12;

          // Rentabilidad bruta real:
          // ingresos anuales / precio compra x 100
          const grossYield = safeDiv(annualRent, safePrice) * 100;

          // Rentabilidad neta real:
          // (ingresos anuales - gastos anuales) / (precio compra + reforma + costes compra) x 100
          const netIncome = annualRent - annualExpenses;
          const netYield = safeDiv(netIncome, totalInvestment) * 100;

          return { ...s, annualRent, netIncome, grossYield, netYield, rating: rating(netYield) };
        });

        // CORRECTO: la hipoteca se calcula solo sobre el precio del activo.
        const loan = safePrice * ltv / 100;
        const downPayment = safePrice - loan;

        // Dinero propio real = entrada + reforma + costes de compra
        const ownMoneyInvested = downPayment + reform + purchaseCosts;

        const monthlyMortgage = mortgagePayment(loan, interest, years);
        const annualMortgage = monthlyMortgage * 12;

        const mortgageScenarios = scenarios.map((s) => {
          const annualCashflow = s.netIncome - annualMortgage;
          const monthlyCashflow = annualCashflow / 12;

          // ROI financiación real:
          // (ingresos anuales - gastos anuales - hipoteca) / (dinero propio + costes de compra) x 100
          // Aquí dinero propio real ya incluye entrada, reforma y costes de compra.
          const financingRoi = safeDiv(annualCashflow, ownMoneyInvested) * 100;
          const dscr = safeDiv(s.netIncome, annualMortgage);

          return { ...s, annualCashflow, monthlyCashflow, financingRoi, dscr };
        });

        return {
          itp,
          ivaFees,
          purchaseCosts,
          totalInvestment,
          annualExpenses,
          scenarios,
          loan,
          downPayment,
          ownMoneyInvested,
          monthlyMortgage,
          annualMortgage,
          mortgageScenarios
        };
      }, [
        price, itpRate, notary, registry, reform, psi, agency, ivaRate, includeIvaFees,
        ibi, community, homeInsurance, rentInsurance, others, management,
        pessimistic, realistic, optimistic, ltv, interest, years
      ]);

      const realisticScenario = data.scenarios[1];
      const mortgageRealistic = data.mortgageScenarios[1];

      function generatePdf() {
        window.print();
      }

      return (
        <div className="print-page min-h-screen p-4 md:p-8">
          <div className="mx-auto max-w-7xl space-y-6">
            <header className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
              <div>
                <div className="mb-2 flex items-center gap-2">
                  <span className="text-2xl">🧮</span>
                  <span className="rounded-full bg-slate-900 px-3 py-1 text-sm font-medium text-white">Grupo Alfa</span>
                </div>
                <h1 className="text-3xl font-bold tracking-tight text-slate-950 md:text-4xl">
                  Calculadora de inversión e hipoteca
                </h1>
                <p className="mt-2 max-w-3xl text-slate-500">
                  Calcula rentabilidad bruta, rentabilidad neta, financiación, cashflow, DSCR y ROI sobre financiación.
                </p>
              </div>
            </header>

            <section className="grid grid-cols-1 gap-4 md:grid-cols-4">
              <Metric title="Inversión total" value={euro.format(data.totalInvestment)} subtitle="Precio + reforma + costes de compra" />
              <Metric title="ITP calculado" value={euro.format(data.itp)} subtitle={`${itpRate}% sobre precio del activo`} />
              <Metric title="Rentabilidad bruta realista" value={pct(realisticScenario.grossYield)} subtitle="Ingresos anuales / precio compra" tone={realisticScenario.rating.tone} />
              <Metric title="Rentabilidad neta realista" value={pct(realisticScenario.netYield)} subtitle="Neto anual / inversión total" tone={realisticScenario.rating.tone} />
            </section>

            <nav className="no-print inline-grid grid-cols-3 gap-1 rounded-2xl bg-slate-200 p-1">
              <button onClick={() => setTab("inversion")} className={`rounded-xl px-4 py-2 text-sm font-medium ${tab === "inversion" ? "bg-white shadow-sm" : "text-slate-600"}`}>🏠 Inversión</button>
              <button onClick={() => setTab("hipoteca")} className={`rounded-xl px-4 py-2 text-sm font-medium ${tab === "hipoteca" ? "bg-white shadow-sm" : "text-slate-600"}`}>🏦 Hipoteca</button>
              <button onClick={() => setTab("pdf")} className={`rounded-xl px-4 py-2 text-sm font-medium ${tab === "pdf" ? "bg-white shadow-sm" : "text-slate-600"}`}>📄 Generar PDF</button>
            </nav>

            {tab === "inversion" && (
              <main className="space-y-5">
                <div className="grid grid-cols-1 gap-5 lg:grid-cols-3">
                  <div className="print-card rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 className="mb-4 text-xl font-semibold">Costes del inmueble</h2>
                    <div className="space-y-4">
                      <Field label="Precio del activo" value={price} setValue={setPrice} />
                      <Field label="ITP" value={itpRate} setValue={setItpRate} suffix="%" step="0.05" />
                      <div className="rounded-xl bg-slate-100 px-3 py-2 text-sm text-slate-700">
                        <span className="font-medium">Importe ITP calculado: </span>{euro.format(data.itp)}
                      </div>
                      <Field label="Notaría y gestoría" value={notary} setValue={setNotary} />
                      <Field label="Registro" value={registry} setValue={setRegistry} />
                      <Field label="Reforma y mobiliario" value={reform} setValue={setReform} />
                      <Field label="Servicio PSI" value={psi} setValue={setPsi} />
                      <Field label="Comisión inmobiliaria" value={agency} setValue={setAgency} />
                      <div className="flex items-center justify-between gap-3 rounded-xl bg-slate-100 p-3">
                        <div>
                          <p className="text-sm font-medium">Incluir IVA en PSI + comisión</p>
                          <p className="text-xs text-slate-500">Activar si quieres calcular honorarios con IVA.</p>
                        </div>
                        <input type="checkbox" checked={includeIvaFees} onChange={(e) => setIncludeIvaFees(e.target.checked)} className="h-5 w-5" />
                      </div>
                      {includeIvaFees && <Field label="IVA honorarios" value={ivaRate} setValue={setIvaRate} suffix="%" step="1" />}
                      <div className="flex justify-between border-t pt-4 font-semibold">
                        <span>Total inversión</span><span>{euro.format(data.totalInvestment)}</span>
                      </div>
                    </div>
                  </div>

                  <div className="print-card rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 className="mb-4 text-xl font-semibold">Gastos recurrentes anuales</h2>
                    <div className="space-y-4">
                      <Field label="IBI + basuras" value={ibi} setValue={setIbi} />
                      <Field label="Comunidad" value={community} setValue={setCommunity} />
                      <Field label="Seguro hogar" value={homeInsurance} setValue={setHomeInsurance} />
                      <Field label="Seguro impago" value={rentInsurance} setValue={setRentInsurance} />
                      <Field label="Otros" value={others} setValue={setOthers} />
                      <Field label="Gestión de alquiler anual" value={management} setValue={setManagement} />
                      <div className="flex justify-between border-t pt-4 font-semibold">
                        <span>Total anual</span><span>{euro.format(data.annualExpenses)}</span>
                      </div>
                    </div>
                  </div>

                  <div className="print-card rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 className="mb-4 text-xl font-semibold">Rentas mensuales</h2>
                    <div className="space-y-4">
                      <Field label="Escenario pesimista" value={pessimistic} setValue={setPessimistic} />
                      <Field label="Escenario realista" value={realistic} setValue={setRealistic} />
                      <Field label="Escenario optimista" value={optimistic} setValue={setOptimistic} />
                      <div className="rounded-xl bg-slate-100 p-3 text-sm text-slate-600">
                        Sin financiación se calcula solo rentabilidad bruta y rentabilidad neta. El ROI aparece únicamente en el apartado de hipoteca.
                      </div>
                    </div>
                  </div>
                </div>

                <div className="print-card overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
                  <div className="flex items-center gap-2 p-5">
                    <span>📈</span>
                    <h2 className="text-xl font-semibold">Rentabilidad sin financiación</h2>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead className="bg-slate-100 text-slate-600">
                        <tr>
                          <th className="p-3 text-left">Escenario</th>
                          <th className="p-3 text-right">Renta mensual</th>
                          <th className="p-3 text-right">Renta anual</th>
                          <th className="p-3 text-right">Neto anual</th>
                          <th className="p-3 text-right">Bruta</th>
                          <th className="p-3 text-right">Neta</th>
                          <th className="p-3 text-left">Lectura</th>
                        </tr>
                      </thead>
                      <tbody>
                        {data.scenarios.map((s) => (
                          <tr key={s.name} className="border-t">
                            <td className="p-3 font-medium">{s.name}</td>
                            <td className="p-3 text-right">{euro.format(s.monthly)}</td>
                            <td className="p-3 text-right">{euro.format(s.annualRent)}</td>
                            <td className="p-3 text-right">{euro.format(s.netIncome)}</td>
                            <td className="p-3 text-right">{pct(s.grossYield)}</td>
                            <td className="p-3 text-right">{pct(s.netYield)}</td>
                            <td className="p-3"><span className="rounded-full border px-3 py-1 text-xs">{s.rating.text}</span></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </main>
            )}

            {tab === "hipoteca" && (
              <main className="space-y-5">
                <div className="grid grid-cols-1 gap-5 lg:grid-cols-3">
                  <div className="print-card rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 className="mb-4 text-xl font-semibold">Datos de financiación</h2>
                    <div className="space-y-4">
                      <Field label="Financiación sobre precio del activo" value={ltv} setValue={setLtv} suffix="%" step="1" />
                      <Field label="Tipo de interés anual / TAE" value={interest} setValue={setInterest} suffix="%" step="0.1" />
                      <Field label="Plazo" value={years} setValue={setYears} suffix="años" step="1" />
                      <div className="rounded-xl bg-slate-100 p-3 text-sm text-slate-600">
                        Simulación con financiación del 80% a 30 años al 2,5% TAE. El apalancamiento maximiza el retorno sobre el capital propio.
                      </div>
                      <div className="rounded-xl bg-slate-100 p-3 text-xs text-slate-500">
                        ROI financiación = (ingresos − gastos − hipoteca) / capital propio invertido
                      </div>
                    </div>
                  </div>

                  <div className="lg:col-span-2 grid grid-cols-1 gap-4 md:grid-cols-2">
                    <Metric title="Importe hipoteca" value={euro.format(data.loan)} subtitle={`${ltv}% del precio del activo`} />
                    <Metric title="Entrada del activo" value={euro.format(data.downPayment)} subtitle="Precio activo - hipoteca" />
                    <Metric title="Cuota mensual" value={euro2.format(data.monthlyMortgage)} subtitle={`${interest}% · ${years} años`} />
                    <Metric title="Capital propio invertido" value={euro.format(data.ownMoneyInvested)} subtitle="Entrada + reforma + costes de compra" />
                    <Metric title="Cashflow mensual realista" value={euro2.format(mortgageRealistic.monthlyCashflow)} subtitle="Después de gastos e hipoteca" tone={mortgageRealistic.monthlyCashflow >= 0 ? "good" : "bad"} />
                    <Metric title="ROI sobre financiación" value={pct(mortgageRealistic.financingRoi)} subtitle="Cashflow anual / capital propio invertido" tone={mortgageRealistic.financingRoi >= 6.5 ? "good" : mortgageRealistic.financingRoi >= 5 ? "warn" : "bad"} />
                  </div>
                </div>

                <div className="print-card overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
                  <div className="flex items-center gap-2 p-5">
                    <span>🏦</span>
                    <h2 className="text-xl font-semibold">Hipoteca, cashflow y ROI por escenarios</h2>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead className="bg-slate-100 text-slate-600">
                        <tr>
                          <th className="p-3 text-left">Escenario</th>
                          <th className="p-3 text-right">Neto anual antes hipoteca</th>
                          <th className="p-3 text-right">Cuotas anuales</th>
                          <th className="p-3 text-right">Cashflow mensual</th>
                          <th className="p-3 text-right">Cashflow anual</th>
                          <th className="p-3 text-right">ROI financiación</th>
                          <th className="p-3 text-right">DSCR</th>
                        </tr>
                      </thead>
                      <tbody>
                        {data.mortgageScenarios.map((s) => (
                          <tr key={s.name} className="border-t">
                            <td className="p-3 font-medium">{s.name}</td>
                            <td className="p-3 text-right">{euro.format(s.netIncome)}</td>
                            <td className="p-3 text-right">{euro.format(data.annualMortgage)}</td>
                            <td className="p-3 text-right">{euro2.format(s.monthlyCashflow)}</td>
                            <td className="p-3 text-right">{euro.format(s.annualCashflow)}</td>
                            <td className="p-3 text-right">{pct(s.financingRoi)}</td>
                            <td className="p-3 text-right">{s.dscr.toFixed(2).replace(".", ",")}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </main>
            )}

            {tab === "pdf" && (
              <main className="space-y-5">
                <div className="print-card rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h2 className="text-2xl font-bold">Informe de viabilidad · Grupo Alfa</h2>
                  <p className="mt-2 text-slate-500">Resumen ordenado para imprimir o guardar como PDF.</p>
                  <div className="no-print mt-5">
                    <button onClick={generatePdf} className="rounded-xl bg-slate-900 px-5 py-3 font-medium text-white shadow-sm">
                      Generar PDF / Imprimir
                    </button>
                  </div>
                </div>

                <section className="grid grid-cols-1 gap-4 md:grid-cols-2">
                  <Metric title="Precio del activo" value={euro.format(price)} subtitle="Base de cálculo de la hipoteca" />
                  <Metric title="ITP calculado" value={euro.format(data.itp)} subtitle={`${itpRate}% sobre precio del activo`} />
                  <Metric title="Inversión total" value={euro.format(data.totalInvestment)} subtitle="Precio + reforma + costes" />
                  <Metric title="Rentabilidad bruta realista" value={pct(realisticScenario.grossYield)} subtitle="Ingresos anuales / precio compra" tone={realisticScenario.rating.tone} />
                  <Metric title="Rentabilidad neta realista" value={pct(realisticScenario.netYield)} subtitle="Neto anual / inversión total" tone={realisticScenario.rating.tone} />
                  <Metric title="Importe hipoteca" value={euro.format(data.loan)} subtitle="Calculada sobre precio del activo" />
                  <Metric title="Cashflow mensual realista" value={euro2.format(mortgageRealistic.monthlyCashflow)} subtitle="Después de gastos e hipoteca" tone={mortgageRealistic.monthlyCashflow >= 0 ? "good" : "bad"} />
                  <Metric title="ROI sobre financiación" value={pct(mortgageRealistic.financingRoi)} subtitle="Cashflow anual / capital propio invertido" tone={mortgageRealistic.financingRoi >= 6.5 ? "good" : mortgageRealistic.financingRoi >= 5 ? "warn" : "bad"} />
                </section>

                <div className="print-card rounded-2xl border border-amber-200 bg-amber-50 p-4 text-sm text-amber-900">
                  La cuota hipotecaria es una simulación matemática. No incluye comisiones bancarias, tasación, productos vinculados, seguros obligatorios, variaciones de tipo ni fiscalidad personal.
                </div>
              </main>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
